{% extends 'base.html' %}
{% block css %}
<style>
    h1{
        text-align:center;
        margin:30px 0;
        color:#2c3e50;
    }

    form{
        width:400px;
        margin:30px auto;
        padding:25px;
        background:#fff;
        border-radius:10px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    form p{
        margin-bottom:15px;
    }

    form label{
        display:block;
        margin-bottom:6px;
        font-weight:bold;
        color:#333;
    }

    form input,
    form select,
    form textarea{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:5px;
        background:#28a745;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#218838;
    }
</style>
{% endblock %}
{% block content %}
    <h1>Edit details</h1>
    <form method="post">
        {% csrf_token %}

        <!-- ready-made form -->
        <!-- {{ form.as_p }} -->
        
        <!-- manual form -->
         <label for="n">Name:</label>
        <input type="text" name="name" value={{student.name}} id="n" /><br><br>
        <label for="ro">Roll no:</label>
        <input type="number" name="roll" value={{student.roll_no}} id="ro" /><br><br>
        <label for="ci">City:</label>
        <input type="text" name="city" value={{student.city}} id="ci" /><br><br>

        <button type="submit">Update</button>
    </form>
{% endblock %}
