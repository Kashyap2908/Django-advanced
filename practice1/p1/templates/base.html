<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        nav{
            background:#2c3e50;
            padding:15px 30px;
            display:flex;
            gap:15px;
            align-items:center;
        }

        nav button{
            border:none;
            background:#3498db;
            border-radius:6px;
            transition:0.3s;
        }

        nav button:hover{
            background:#2980b9;
        }

        nav a{
            display:block;
            padding:10px 20px;
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
    </style>
    {% block css %}
    {% endblock %}

</head>

<body>

    <nav>
        <button>
            <a href="{% url 'add' %}">Add Student</a>
        </button>

        <button>
            <a href="{% url 'show' %}">Show Students</a>
        </button>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
