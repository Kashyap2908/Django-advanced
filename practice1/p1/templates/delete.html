{% extends 'base.html' %}
{% block css %}
<style>
    form{
        width:450px;
        margin:50px auto;
        padding:25px;
        background:#fff;
        border-radius:10px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
        text-align:center;
    }

    h2{
        color:#dc3545;
        margin-bottom:20px;
    }

    pre{
        font-family:Arial, Helvetica, sans-serif;
        font-size:16px;
        text-align:left;
        line-height:1.8;
        background:#f8f9fa;
        padding:15px;
        border-radius:6px;
        margin-bottom:20px;
    }

    button{
        border:none;
        padding:10px 20px;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
        margin:0 10px;
    }

    button[type="submit"]{
        background:#dc3545;
        color:white;
    }

    button[type="submit"]:hover{
        background:#c82333;
    }

    button a{
        text-decoration:none;
        color:white;
        display:block;
    }

    button:last-child{
        background:#6c757d;
    }

    button:last-child:hover{
        background:#5a6268;
    }
</style>
{% endblock %}
{% block content %}
<form action="" method="post">
    {% csrf_token %}
    <pre>
        Name: {{student.name}}
        ROll no: {{student.roll_no}}
        city: {{student.city}}

        Do you want to delete this record ?
    </pre>
    <button type="submit"> Yes </button>
</form>
{% endblock %}
