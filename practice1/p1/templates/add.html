{% extends 'base.html' %}
{% block css %}
<style>
    h1{
        text-align:center;
        margin:30px 0;
        color:#2c3e50;
    }

    form{
        width:400px;
        margin:30px auto;
        padding:25px;
        background:#fff;
        border-radius:10px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    form p{
        margin-bottom:15px;
    }

    form label{
        display:block;
        margin-bottom:6px;
        font-weight:bold;
        color:#333;
    }

    form input,
    form select,
    form textarea{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:16px;
        outline:none;
    }

    form input:focus,
    form select:focus,
    form textarea:focus{
        border-color:#3498db;
        box-shadow:0 0 5px rgba(52,152,219,0.3);
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:5px;
        background:#3498db;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#2980b9;
    }
</style>
{% endblock %}
{% block content %}
    <h1>Add new Student</h1>
    <form action="#" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>
{% endblock %}
