<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(to right,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.25);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        p{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

    <div class="login-container">

        <h1>Login</h1>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Login</button>
        </form>

    </div>

</body>
</html>
