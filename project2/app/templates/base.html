<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        nav{
            background:#2563eb;
            padding:15px 30px;
            display:flex;
            justify-content:flex-end;
            gap:15px;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }

        nav button{
            background:white;
            border:none;
            border-radius:5px;
            padding:10px 18px;
            cursor:pointer;
            transition:0.3s;
        }

        nav button:hover{
            background:#dbeafe;
            transform:scale(1.05);
        }

        nav a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
            font-size:16px;
        }

        .container{
            width:90%;
            margin:30px auto;
        }
    </style>

    {% block css %}
    {% endblock css %}
</head>
<body>

    <nav>
        <button><a href="{% url 'home' %}">Home</a></button>
        <button><a href="{% url 'add' %}">Add Student</a></button>
        <button><a href="{% url 'logout' %}">Logout</a></button>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock content %}
    </div>

</body>
</html>
