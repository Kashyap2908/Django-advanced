<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(to right,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            width:450px;
            padding:40px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.25);
        }

        h1{
            color:#333;
            margin-bottom:30px;
        }

        a{
            display:block;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:12px;
            margin:15px 0;
            border-radius:6px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        a:hover{
            background:#1d4ed8;
            transform:scale(1.03);
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Student Management System</h1>

        <a href="{% url 'show_stu' %}">
            📋 Show Students
        </a>

        <a href="{% url 'upload' %}">
            📤 Upload CSV
        </a>

    </div>

</body>
</html>
